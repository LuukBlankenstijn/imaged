syntax = "proto3";

package dashboard.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Host {
  int64 id = 1;
  string mac_address = 2;
  string name = 3;
  uint64 disk_size_bytes = 4;
}

message GetAllHostsResponse {
  repeated Host hosts = 1;
}

message UpdateNameRequest {
  int64 id = 1;
  string new_name = 2;
}

message DeleteRequest {
  int64 id = 1;
}

message HostConnectionEvent {
  int64 id = 1;
  bool connected = 2;
}

message Image {
  int64 id = 1;
  string name = 2;
  google.protobuf.Timestamp captured_at = 3;
  string status = 4;
  optional string error_message = 5;
  repeated ImagePartition partitions = 6;
}

message ImagePartition {
  int64 id = 1;
  int64 partition_number = 2;
  string fstype = 3;
  uint64 size_bytes = 4;
}

message GetAllImagesResponse {
  repeated Image images = 1;
}

message CreateImageRequest {
  string name = 1;
  int64 host_id = 2;
}

service DashboardService {
  rpc GetAllHosts(google.protobuf.Empty) returns (GetAllHostsResponse) {}
  rpc UpdateHostName(UpdateNameRequest) returns (Host) {}
  rpc DeleteHost(DeleteRequest) returns (google.protobuf.Empty) {}
  // sends updates on the host connection status. On first connect receives the current state will be send
  // as a bunch of connected = true messages
  rpc ConnectionState(google.protobuf.Empty) returns (stream HostConnectionEvent) {}

  rpc GetAllImages(google.protobuf.Empty) returns (GetAllImagesResponse) {}
  rpc UpdateImageName(UpdateNameRequest) returns (Image) {}
  // Creates an image and captures it from the specified host.
  // If this host is not online, there will be a task put in the queue
  rpc CreateImage(CreateImageRequest) returns (Image) {}
  rpc DeleteImage(DeleteRequest) returns (google.protobuf.Empty) {}
}
