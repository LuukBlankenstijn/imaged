# Bind only to the container's interface
bind-dynamic
interface=eth0

# No DNS forwarding (keep this hermetic)
port=0

# DHCP for VMs
dhcp-range=192.168.100.100,192.168.100.200,12h
dhcp-authoritative

# TFTP
enable-tftp
tftp-root=/var/lib/tftpboot

# PXE
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
dhcp-boot=tag:bios,undionly.kpxe,,192.168.100.2
dhcp-boot=tag:efi64,ipxe.efi,,192.168.100.2

# Be chatty so we can see what's happening
log-dhcp
