syntax = "proto3";

package dashboard.v1;

message Group {
  int64 id = 1;
  string name = 2;
}

message CreateGroupRequest {
  string name = 1;
  repeated int64 host_ids = 2;
}

message GetGroupsResponse {
  repeated Group groups = 1;
}

message UpdateGroupRequest {
  int64 id = 1;
  repeated int64 host_ids = 2;
}
