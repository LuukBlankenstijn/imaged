syntax = "proto3";

package dashboard.v1;

import "google/protobuf/empty.proto";
import "v1/dashboard/group.proto";
import "v1/dashboard/host.proto";
import "v1/dashboard/image.proto";
import "v1/dashboard/task.proto";

message Id {
  int64 id = 1;
}

message UpdateNameRequest {
  int64 id = 1;
  string new_name = 2;
}

service DashboardService {
  rpc GetAllHosts(GetAllHostsRequest) returns (GetHostsResponse) {}
  rpc UpdateHostName(UpdateNameRequest) returns (Host) {}
  rpc DeleteHost(Id) returns (google.protobuf.Empty) {}
  // sends updates on the host connection status. On first connect receives the current state will be send
  // as a bunch of connected = true messages
  rpc ConnectionState(google.protobuf.Empty) returns (stream HostConnectionEvent) {}
  rpc Deploy(DeployHostRequest) returns (Task) {}
  rpc Multicast(MulticastHostsRequest) returns (google.protobuf.Empty) {}
  rpc Reboot(RebootHostsRequest) returns (google.protobuf.Empty) {}

  rpc GetAllImages(google.protobuf.Empty) returns (GetImagesResponse) {}
  rpc UpdateImageName(UpdateNameRequest) returns (Image) {}
  // Creates an image and captures it from the specified host.
  // If this host is not online, there will be a task put in the queue
  rpc CreateImage(CreateImageRequest) returns (Image) {}
  rpc DeleteImage(Id) returns (google.protobuf.Empty) {}

  rpc GetAllTasks(google.protobuf.Empty) returns (GetTasksResponse) {}
  rpc CancelTask(Id) returns (google.protobuf.Empty) {}
  rpc RetryTask(Id) returns (google.protobuf.Empty) {}

  rpc CreateGroup(CreateGroupRequest) returns (Group) {}
  rpc UpdateGroupName(UpdateNameRequest) returns (Group) {}
  rpc GetAllGroups(google.protobuf.Empty) returns (GetGroupsResponse) {}
  rpc UpdateGroupMemberships(UpdateGroupRequest) returns (Group) {}
  rpc DeleteGroup(Id) returns (google.protobuf.Empty) {}
}
