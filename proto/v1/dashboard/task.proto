syntax = "proto3";

package dashboard.v1;

import "google/protobuf/timestamp.proto";

enum TaskType {
  TYPE_UNSPECIFIED = 0;
  TYPE_CAPTURE = 1;
  TYPE_DEPLOY = 2;
  TYPE_MULTICAST = 3;
  TYPE_REBOOT = 4;
}

enum TaskState {
  TASK_UNSPECIFIED = 0;
  TASK_PENDING = 1;
  TASK_RUNNING = 2;
  TASK_DONE = 3;
  TASK_CANCELLED = 4;
  TASK_FAILED = 5;
  TASK_PARTIAL = 6;
}

message TaskHost {
  int64 host_id = 1;
  TaskState state = 2;
  optional string error = 3;
  optional google.protobuf.Timestamp started_at = 4;
  optional google.protobuf.Timestamp finished_at = 5;
}

message Task {
  int64 id = 1;
  TaskType type = 2;
  repeated TaskHost hosts = 3;
  optional int64 image_id = 4;
  // Derived rollup of the per-host states (may be TASK_PARTIAL).
  TaskState state = 5;
  google.protobuf.Timestamp created_at = 6;
  optional string image_name = 10;
  bool image_deleted = 11;
}

message GetTasksResponse {
  repeated Task tasks = 1;
}
