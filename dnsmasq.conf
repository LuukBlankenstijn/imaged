# Bind only to the container's interface
bind-dynamic
interface=eth0

# No DNS forwarding (keep this hermetic)
port=0

# DHCP for VMs
dhcp-range=192.168.100.100,192.168.100.200,12h
dhcp-authoritative

# PXE / TFTP are served by imaged-server on 192.168.100.1

# Detect iPXE-capable clients via DHCP user-class
dhcp-userclass=set:ipxe,iPXE

# Client architecture (DHCP option 93)
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9

# Bare PXE ROMs: chainload iPXE via TFTP from imaged-server
dhcp-boot=tag:!ipxe,tag:bios,undionly.kpxe,,192.168.100.1
dhcp-boot=tag:!ipxe,tag:efi64,ipxe.efi,,192.168.100.1

# iPXE clients: jump straight to the server's HTTP boot script
dhcp-boot=tag:ipxe,http://192.168.100.1:8080/boot/boot.ipxe

# Be chatty so we can see what's happening
log-dhcp
